# Deploy the static site at repo root to GitHub Pages.
# In repo Settings > Pages, set "Build and deployment" source to "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (exclude repo metadata)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' . _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@3
        with:
          path: _site

  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@4
